name: Deploy API to Oracle Cloud

on:
  push:
    branches:
      - master # Se a sua branch principal for 'master', altere aqui.

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 1.5 Setup PHP e Instalação de Dependências
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Altere para a versão exata do seu projeto
      
      - name: Instalando Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev
        working-directory: ./src # Aponta para onde o seu composer.json está  

      - name: 2. Transferência Segura (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/api-producao"

      - name: 3. Orquestração Docker (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Puxa a cópia intacta do .env do cofre para o diretório da aplicação
            cp /home/ubuntu/.env_producao /home/ubuntu/api-producao/.env
            
            cd /home/ubuntu/api-producao
            
            # 2. Garante que as pastas do Laravel existam e tenham permissão correta 
            # (evita o erro do bootstrap/cache e storage)
            mkdir -p src/bootstrap/cache src/storage/framework/{sessions,views,cache} src/storage/logs
            sudo chown -R 1000:1000 src/bootstrap/cache src/storage
            sudo chmod -R 775 src/bootstrap/cache src/storage
            
            # 3. Reinicia os containers rapidamente para assumir o novo código
            docker compose up -d
            docker compose restart
            
            # 4. Estrutura o banco e limpa lixo
            docker exec carteira_app php artisan migrate --force
            docker image prune -af