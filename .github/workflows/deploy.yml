name: Deploy API to Oracle Cloud

on:
  push:
    branches:
      - master # Se a sua branch principal for 'master', altere aqui.

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 1.5 Setup PHP e Instalação de Dependências
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Altere para a versão exata do seu projeto
      
      - name: Instalando Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev
        working-directory: ./src # Aponta para onde o seu composer.json está  

      - name: 2. Transferência Segura (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/ubuntu/api-producao"
          rm: true # Previne acúmulo de lixo apagando arquivos antigos do alvo antes de copiar

      - name: 3. Orquestração Docker (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Restaura o arquivo .env do cofre seguro
            cp /home/ubuntu/.env_producao /home/ubuntu/api-producao/.env
            
            cd /home/ubuntu/api-producao
            
            # 2. Levanta e atualiza a infraestrutura instantaneamente
            docker compose up -d
            docker compose restart
            
            # 3. Executa as migrations automaticamente a cada deploy
            docker exec carteira_app php artisan migrate --force
            
            # 4. Limpa o lixo
            docker image prune -af