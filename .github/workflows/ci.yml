name: Laravel CI

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código
        uses: actions/checkout@v4

      - name: 2. Configurar PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # O ajuste cirúrgico para refletir sua máquina
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, intl, gd
          coverage: none

      - name: 3. Cache do Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: 4. Instalar Dependências
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 5. Forjar Ambiente de Testes
        run: |
            cp .env.example .env
            php artisan key:generate --env=testing

      - name: 6. O Tribunal de Execução (Rodar Testes)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan test