services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: carteira_app
    restart: unless-stopped
    env_file: .env # Força a leitura das variáveis de ambiente na raiz
    volumes:
      - ./src:/var/www/html
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel-network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: carteira_worker
    restart: always
    env_file: .env
    volumes:
      - ./src:/var/www/html
    user: "1000:1000"
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - laravel-network
      
  web:
    image: nginx:alpine
    container_name: carteira_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
    networks:
      - laravel-network

  db:
    image: mysql:8.0
    container_name: carteira_db
    restart: always
    env_file: .env # Puxa a senha daqui, nunca do texto plano
    environment:
      MYSQL_DATABASE: laravel_app
      # A variável MYSQL_ROOT_PASSWORD deve estar no seu arquivo .env no servidor
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: carteira_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data: