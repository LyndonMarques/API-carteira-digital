services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: carteira_app
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    user: "1000:1000" # Permissões corrigidas
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - laravel-network

  # O Operário Assíncrono (Processamento em Background)
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: carteira_worker
    restart: always
    volumes:
      - ./src:/var/www/html
    user: "1000:1000"
    # Sobrescreve o comportamento padrão do container para rodar a fila
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - laravel-network
      
  web:
    image: nginx:alpine
    container_name: carteira_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
    networks:
      - laravel-network

  db:
    image: mysql:8.0
    container_name: carteira_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # A peça que faltava para escalar a API
  redis:
    image: redis:alpine
    container_name: carteira_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data: